<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #eff4ee;
            --card: #fbfffb;
            --line: #cfdacd;
            --text: #1f2720;
            --muted: #5f6b60;
            --primary: #1d6f47;
            --accent: #c5842e;
            --danger: #ac3f2b;
            --radius: 16px;
            --shadow: 0 16px 40px rgba(34, 50, 35, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            color: var(--text);
            font-family: 'Noto Sans SC', sans-serif;
            background:
                radial-gradient(circle at 85% 10%, rgba(197, 132, 46, 0.25), transparent 32%),
                radial-gradient(circle at 9% 88%, rgba(29, 111, 71, 0.2), transparent 30%),
                var(--bg);
            min-height: 100vh;
            padding: 24px;
        }

        .shell {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            gap: 16px;
        }

        .topbar {
            background: rgba(251, 255, 251, 0.88);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 21px;
        }

        .hint {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
        }

        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a,
        .nav button {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            padding: 8px 12px;
            font-size: 13px;
        }

        .nav button {
            cursor: pointer;
            font: inherit;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
            animation: enter .35s ease;
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin: 0 0 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .field {
            margin-bottom: 10px;
            min-width: 0;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--muted);
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 10px 12px;
            font: inherit;
            color: var(--text);
            background: #fff;
            outline: none;
            transition: border-color .2s ease, box-shadow .2s ease;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(29, 111, 71, 0.15);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
        }

        .check {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            padding-top: 8px;
            font-size: 14px;
        }

        .check input {
            width: auto;
            margin: 0;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            border: 1px solid transparent;
            border-radius: 12px;
            font: inherit;
            font-weight: 600;
            padding: 10px 14px;
            cursor: pointer;
            transition: transform .15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-secondary {
            border-color: var(--line);
            background: #fff;
            color: var(--text);
        }

        .status {
            margin-top: 10px;
            font-size: 13px;
            color: var(--muted);
            min-height: 20px;
        }

        .danger {
            color: var(--danger);
        }

        .meta {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <header class="topbar">
            <div>
                <h1 class="brand">配置中心</h1>
                <p class="hint">直接读写 config/config.json，后端请求会自动热读取新配置，无需重启进程。管理页面由 ADMIN_PASSWORD 保护。</p>
            </div>
            <nav class="nav">
                <a href="/">测试请求</a>
                <a href="/admin.html">管理登录</a>
                <a href="/config.html">配置中心</a>
                <a href="/logs.html">请求日志</a>
                <button type="button" id="logoutBtn">退出登录</button>
            </nav>
        </header>

        <section class="panel">
            <h2>代理配置</h2>
            <form id="configForm">
                <div class="grid">
                    <div class="field full">
                        <label for="OPENAI_API_KEY">OPENAI_API_KEY</label>
                        <input type="password" id="OPENAI_API_KEY" placeholder="sk-...">
                    </div>

                    <div class="field full">
                        <label for="SOURCE_API_URL">SOURCE_API_URL</label>
                        <input type="text" id="SOURCE_API_URL" placeholder="https://api.openai.com">
                    </div>

                    <div class="field full">
                        <label for="CORS_ALLOW_ORIGIN">CORS_ALLOW_ORIGIN</label>
                        <input type="text" id="CORS_ALLOW_ORIGIN" placeholder="*">
                    </div>

                    <div class="field full">
                        <label for="ADMIN_PASSWORD">ADMIN_PASSWORD</label>
                        <input type="password" id="ADMIN_PASSWORD" placeholder="设置后将保护配置页和日志页">
                    </div>

                    <div class="field">
                        <label for="ADMIN_SESSION_TTL_HOURS">ADMIN_SESSION_TTL_HOURS</label>
                        <input type="number" id="ADMIN_SESSION_TTL_HOURS" min="1" max="720" step="1">
                    </div>

                    <div class="field">
                        <label for="HEARTBEAT_INTERVAL_MS">HEARTBEAT_INTERVAL_MS</label>
                        <input type="number" id="HEARTBEAT_INTERVAL_MS" min="500" step="100">
                    </div>

                    <div class="field">
                        <label for="CHUNK_TARGET_LENGTH">CHUNK_TARGET_LENGTH</label>
                        <input type="number" id="CHUNK_TARGET_LENGTH" min="1" step="1">
                    </div>

                    <div class="field">
                        <label for="CHUNK_DELAY_MS">CHUNK_DELAY_MS</label>
                        <input type="number" id="CHUNK_DELAY_MS" min="0" step="1">
                    </div>

                    <div class="field">
                        <label for="LOG_MAX_OUTPUT_CHARS">LOG_MAX_OUTPUT_CHARS</label>
                        <input type="number" id="LOG_MAX_OUTPUT_CHARS" min="200" step="100">
                    </div>

                    <div class="field">
                        <label for="LOG_RETENTION">LOG_RETENTION</label>
                        <input type="number" id="LOG_RETENTION" min="100" step="100">
                    </div>

                    <div class="field full">
                        <label for="UPSTREAM_EXTRA_HEADERS_JSON">UPSTREAM_EXTRA_HEADERS_JSON（JSON 对象字符串）</label>
                        <textarea id="UPSTREAM_EXTRA_HEADERS_JSON"
                            placeholder='{"HTTP-Referer":"https://example.com/","X-Title":"proxy"}'></textarea>
                    </div>

                    <label class="check">
                        <input type="checkbox" id="ALLOW_ENV_API_KEY">
                        ALLOW_ENV_API_KEY
                    </label>

                    <label class="check">
                        <input type="checkbox" id="DEBUG">
                        DEBUG
                    </label>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary" id="saveBtn">保存配置</button>
                    <button type="button" class="btn-secondary" id="reloadBtn">重新读取</button>
                </div>
            </form>

            <div id="status" class="status"></div>
            <div id="meta" class="meta"></div>
        </section>
    </div>

    <script>
        const state = {
            configPath: '',
            lastLoadedAt: '',
        };

        const fields = [
            'OPENAI_API_KEY',
            'SOURCE_API_URL',
            'CORS_ALLOW_ORIGIN',
            'ADMIN_PASSWORD',
            'ADMIN_SESSION_TTL_HOURS',
            'HEARTBEAT_INTERVAL_MS',
            'CHUNK_TARGET_LENGTH',
            'CHUNK_DELAY_MS',
            'LOG_MAX_OUTPUT_CHARS',
            'LOG_RETENTION',
            'UPSTREAM_EXTRA_HEADERS_JSON',
        ];

        const boolFields = ['ALLOW_ENV_API_KEY', 'DEBUG'];

        const statusEl = document.getElementById('status');
        const metaEl = document.getElementById('meta');
        const saveBtn = document.getElementById('saveBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        function getLoginUrl(reason = '') {
            const params = new URLSearchParams();
            params.set('next', location.pathname);
            if (reason) params.set('reason', reason);
            return `/admin.html?${params.toString()}`;
        }

        function goLogin(reason = '') {
            window.location.href = getLoginUrl(reason);
        }

        async function parseJsonSafe(res) {
            try {
                return await res.json();
            } catch (error) {
                return {};
            }
        }

        async function fetchJson(url, options = {}) {
            const res = await fetch(url, {
                credentials: 'same-origin',
                ...options,
            });
            const data = await parseJsonSafe(res);

            if (res.status === 401 || res.status === 503) {
                goLogin(data?.error?.type || 'admin_unauthorized');
                throw new Error(data?.error?.message || '管理员登录已失效');
            }

            return { res, data };
        }

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.className = isError ? 'status danger' : 'status';
        }

        function renderMeta() {
            const part1 = state.configPath ? `配置文件：${state.configPath}` : '';
            const part2 = state.lastLoadedAt ? `最后读取：${state.lastLoadedAt}` : '';
            metaEl.textContent = [part1, part2].filter(Boolean).join(' | ');
        }

        function fillForm(config) {
            for (const key of fields) {
                const input = document.getElementById(key);
                if (!input) continue;
                input.value = config?.[key] ?? '';
            }

            for (const key of boolFields) {
                const input = document.getElementById(key);
                if (!input) continue;
                input.checked = !!config?.[key];
            }
        }

        function collectPayload() {
            const payload = {};

            for (const key of fields) {
                const input = document.getElementById(key);
                if (!input) continue;

                if (['ADMIN_SESSION_TTL_HOURS', 'HEARTBEAT_INTERVAL_MS', 'CHUNK_TARGET_LENGTH', 'CHUNK_DELAY_MS', 'LOG_MAX_OUTPUT_CHARS', 'LOG_RETENTION'].includes(key)) {
                    payload[key] = Number(input.value || 0);
                } else {
                    payload[key] = input.value;
                }
            }

            for (const key of boolFields) {
                const input = document.getElementById(key);
                if (!input) continue;
                payload[key] = !!input.checked;
            }

            return payload;
        }

        async function refreshAdminSession(password) {
            const { res, data } = await fetchJson('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password }),
            });

            if (!res.ok) {
                throw new Error(data?.error?.message || `登录失败：${res.status}`);
            }
        }

        async function loadConfig() {
            setStatus('读取配置中...');
            reloadBtn.disabled = true;

            try {
                const { res, data } = await fetchJson('/api/config');
                if (!res.ok) {
                    throw new Error(data?.error?.message || `读取失败：${res.status}`);
                }

                fillForm(data.config || {});
                state.configPath = data.config_path || '';
                state.lastLoadedAt = new Date().toLocaleString('zh-CN');
                renderMeta();
                setStatus('配置读取成功');
            } catch (error) {
                setStatus(`读取失败：${error.message}`, true);
            } finally {
                reloadBtn.disabled = false;
            }
        }

        async function saveConfig(event) {
            event.preventDefault();

            saveBtn.disabled = true;
            setStatus('保存中...');

            try {
                const payload = collectPayload();

                const { res, data } = await fetchJson('/api/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                if (!res.ok) {
                    throw new Error(data?.error?.message || `保存失败：${res.status}`);
                }

                if (payload.ADMIN_PASSWORD) {
                    await refreshAdminSession(payload.ADMIN_PASSWORD);
                }

                fillForm(data.config || {});
                state.configPath = data.config_path || state.configPath;
                state.lastLoadedAt = new Date().toLocaleString('zh-CN');
                renderMeta();
                setStatus('配置已保存，后续请求会自动使用新值');
            } catch (error) {
                setStatus(`保存失败：${error.message}`, true);
            } finally {
                saveBtn.disabled = false;
            }
        }

        async function logout() {
            logoutBtn.disabled = true;
            setStatus('退出登录中...');

            try {
                await fetch('/api/admin/logout', {
                    method: 'POST',
                    credentials: 'same-origin',
                });
            } finally {
                goLogin('logout');
            }
        }

        document.getElementById('configForm').addEventListener('submit', saveConfig);
        reloadBtn.addEventListener('click', loadConfig);
        logoutBtn.addEventListener('click', logout);

        loadConfig();
    </script>
</body>

</html>
