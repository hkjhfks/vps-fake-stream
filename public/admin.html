<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f4efe8;
            --card: #fffdf9;
            --line: #dad2c7;
            --text: #28241f;
            --muted: #686056;
            --primary: #1f5b63;
            --accent: #c98a2e;
            --danger: #a5402c;
            --radius: 18px;
            --shadow: 0 18px 48px rgba(49, 40, 27, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 14%, rgba(31, 91, 99, 0.15), transparent 34%),
                radial-gradient(circle at 84% 12%, rgba(201, 138, 46, 0.18), transparent 28%),
                var(--bg);
            display: grid;
            place-items: center;
        }

        .shell {
            width: min(100%, 940px);
            display: grid;
            gap: 16px;
        }

        .topbar,
        .panel {
            background: rgba(255, 253, 249, 0.92);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .topbar {
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
        }

        .hint {
            margin: 6px 0 0;
            font-size: 13px;
            color: var(--muted);
        }

        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #fff;
            padding: 8px 12px;
            font-size: 13px;
        }

        .panel {
            padding: 22px;
            display: grid;
            gap: 16px;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.1fr .9fr;
            gap: 16px;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            background: #fff;
        }

        h2,
        h3 {
            margin: 0 0 10px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--muted);
        }

        input,
        button {
            font: inherit;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(31, 91, 99, 0.15);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-secondary {
            background: #fff;
            border-color: var(--line);
            color: var(--text);
        }

        .meta,
        .status,
        .list {
            font-size: 13px;
            color: var(--muted);
        }

        .status.error {
            color: var(--danger);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 6px 10px;
            background: #f5efe5;
            font-size: 12px;
            color: var(--text);
        }

        .list {
            display: grid;
            gap: 8px;
            margin-top: 8px;
        }

        @media (max-width: 860px) {
            .hero {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <header class="topbar">
            <div>
                <h1 class="brand">管理登录</h1>
                <p class="hint">保护配置中心、日志页和管理接口。代理接口 `/v1/chat/completions` 不受这里的登录影响。</p>
            </div>
            <nav class="nav">
                <a href="/">测试请求</a>
                <a href="/config.html">配置中心</a>
                <a href="/logs.html">请求日志</a>
            </nav>
        </header>

        <section class="panel">
            <div class="hero">
                <div class="card">
                    <h2>管理员密码登录</h2>
                    <form id="loginForm">
                        <div class="field">
                            <label for="password">ADMIN_PASSWORD</label>
                            <input type="password" id="password" placeholder="请输入 config/config.json 中设置的密码" autocomplete="current-password">
                        </div>
                        <div class="actions">
                            <button type="submit" class="btn-primary" id="loginBtn">登录</button>
                            <button type="button" class="btn-secondary" id="logoutBtn">清除登录</button>
                        </div>
                    </form>
                    <div id="status" class="status"></div>
                    <div id="meta" class="meta"></div>
                </div>

                <div class="card">
                    <h3>管理面覆盖范围</h3>
                    <div class="list">
                        <div>1. `/config.html` 与 `/api/config`</div>
                        <div>2. `/logs.html` 与 `/api/logs`</div>
                        <div>3. Cookie 为 HttpOnly，会在同域管理页面自动带上</div>
                    </div>
                    <div style="margin-top:14px;" class="pill" id="authPill">读取登录状态中...</div>
                    <div class="list" id="reasonBox"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const query = new URLSearchParams(location.search);
        const nextPath = query.get('next') || '/config.html';
        const reason = query.get('reason') || '';

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const passwordInput = document.getElementById('password');
        const statusEl = document.getElementById('status');
        const metaEl = document.getElementById('meta');
        const authPill = document.getElementById('authPill');
        const reasonBox = document.getElementById('reasonBox');

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.className = isError ? 'status error' : 'status';
        }

        function redirectNext() {
            window.location.href = nextPath;
        }

        function renderReason() {
            const reasonMap = {
                admin_unauthorized: '管理员 Cookie 已失效或未登录，请重新输入密码。',
                admin_not_configured: '当前还没有设置 ADMIN_PASSWORD，请先修改 config/config.json。',
                logout: '管理员登录已清除。',
            };

            const text = reasonMap[reason];
            reasonBox.innerHTML = text ? `<div>${text}</div>` : '';
        }

        async function parseJsonSafe(res) {
            try {
                return await res.json();
            } catch (error) {
                return {};
            }
        }

        async function loadSession() {
            setStatus('读取登录状态中...');
            renderReason();

            try {
                const res = await fetch('/api/admin/session', {
                    credentials: 'same-origin',
                });
                const data = await parseJsonSafe(res);
                if (!res.ok) {
                    throw new Error(data?.error?.message || `读取失败：${res.status}`);
                }

                metaEl.textContent = `登录成功后将跳转到：${nextPath} | 会话时长：${data.session_ttl_hours} 小时`;

                if (!data.auth_enabled) {
                    authPill.textContent = '未启用管理鉴权';
                    setStatus('请先在 config/config.json 中设置 ADMIN_PASSWORD，再回来登录。', true);
                    loginBtn.disabled = true;
                    passwordInput.disabled = true;
                    return;
                }

                authPill.textContent = data.authenticated ? '已登录' : '等待登录';
                loginBtn.disabled = false;
                passwordInput.disabled = false;

                if (data.authenticated) {
                    setStatus('已检测到有效登录，正在跳转...');
                    redirectNext();
                    return;
                }

                setStatus('请输入管理员密码后登录。');
            } catch (error) {
                setStatus(`状态读取失败：${error.message}`, true);
            }
        }

        async function login(event) {
            event.preventDefault();

            const password = passwordInput.value.trim();
            if (!password) {
                setStatus('请输入 ADMIN_PASSWORD', true);
                return;
            }

            loginBtn.disabled = true;
            setStatus('登录中...');

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password }),
                });
                const data = await parseJsonSafe(res);
                if (!res.ok) {
                    throw new Error(data?.error?.message || `登录失败：${res.status}`);
                }

                authPill.textContent = '已登录';
                setStatus('登录成功，正在跳转...');
                redirectNext();
            } catch (error) {
                setStatus(`登录失败：${error.message}`, true);
            } finally {
                loginBtn.disabled = false;
            }
        }

        async function logout() {
            logoutBtn.disabled = true;
            setStatus('清除登录中...');

            try {
                await fetch('/api/admin/logout', {
                    method: 'POST',
                    credentials: 'same-origin',
                });
                authPill.textContent = '已退出';
                setStatus('管理员登录已清除');
                passwordInput.value = '';
            } catch (error) {
                setStatus(`退出失败：${error.message}`, true);
            } finally {
                logoutBtn.disabled = false;
            }
        }

        loginForm.addEventListener('submit', login);
        logoutBtn.addEventListener('click', logout);

        loadSession();
    </script>
</body>

</html>
